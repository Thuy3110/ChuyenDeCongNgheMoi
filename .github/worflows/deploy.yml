name: CD Deploy

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Docker containers
        run: |
          docker compose down
          docker compose up -d --build
          docker compose exec -T backend python manage.py collectstatic --noinput